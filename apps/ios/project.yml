name: Dryads AI
options:
  bundleIdPrefix: ai.dryadsai
  deploymentTarget:
    iOS: "18.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "6.0"

packages:
  DryadsAiKit:
    path: ../shared/DryadsAiKit
  Swabble:
    path: ../../Swabble

schemes:
  Dryads AI:
    shared: true
    build:
      targets:
        Dryads AI: all
    test:
      targets:
        - DryadsAiTests

targets:
  Dryads AI:
    type: application
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: Sources
    dependencies:
      - target: DryadsAiShareExtension
        embed: true
      - target: DryadsAiWatchApp
      - package: DryadsAiKit
      - package: DryadsAiKit
        product: DryadsAiChatUI
      - package: DryadsAiKit
        product: DryadsAiProtocol
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    preBuildScripts:
      - name: SwiftFormat (lint)
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftformat >/dev/null 2>&1; then
            echo "error: swiftformat not found (brew install swiftformat)" >&2
            exit 1
          fi
          swiftformat --lint --config "$SRCROOT/../../.swiftformat" \
            --filelist "$SRCROOT/SwiftSources.input.xcfilelist"
      - name: SwiftLint
        basedOnDependencyAnalysis: false
        inputFileLists:
          - $(SRCROOT)/SwiftSources.input.xcfilelist
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/bin:$PATH"
          if ! command -v swiftlint >/dev/null 2>&1; then
            echo "error: swiftlint not found (brew install swiftlint)" >&2
            exit 1
          fi
          swiftlint lint --config "$SRCROOT/.swiftlint.yml" --use-script-input-file-lists
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: Sources/Dryads AI.entitlements
        CODE_SIGN_STYLE: "$(DRYADS_AI_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(DRYADS_AI_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(DRYADS_AI_APP_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(DRYADS_AI_APP_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        ENABLE_APPINTENTS_METADATA: NO
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Dryads AI
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLName: ai.dryadsai.ios
            CFBundleURLSchemes:
              - dryads-ai
        CFBundleShortVersionString: "2026.2.18"
        CFBundleVersion: "20260218"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UIBackgroundModes:
          - audio
          - remote-notification
        NSLocalNetworkUsageDescription: Dryads AI discovers and connects to your Dryads AI gateway on the local network.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoadsInWebContent: true
        NSBonjourServices:
          - _dryads-ai-gw._tcp
        NSCameraUsageDescription: Dryads AI can capture photos or short video clips when requested via the gateway.
        NSLocationWhenInUseUsageDescription: Dryads AI uses your location when you allow location sharing.
        NSLocationAlwaysAndWhenInUseUsageDescription: Dryads AI can share your location in the background when you enable Always.
        NSMicrophoneUsageDescription: Dryads AI needs microphone access for voice wake.
        NSSpeechRecognitionUsageDescription: Dryads AI uses on-device speech recognition for voice wake.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  DryadsAiShareExtension:
    type: app-extension
    platform: iOS
    configFiles:
      Debug: Signing.xcconfig
      Release: Signing.xcconfig
    sources:
      - path: ShareExtension
    dependencies:
      - package: DryadsAiKit
    settings:
      base:
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: "$(DRYADS_AI_CODE_SIGN_STYLE)"
        DEVELOPMENT_TEAM: "$(DRYADS_AI_DEVELOPMENT_TEAM)"
        PRODUCT_BUNDLE_IDENTIFIER: "$(DRYADS_AI_SHARE_BUNDLE_ID)"
        PROVISIONING_PROFILE_SPECIFIER: "$(DRYADS_AI_SHARE_PROFILE)"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Dryads AI Share
        CFBundleShortVersionString: "2026.2.18"
        CFBundleVersion: "20260218"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 10
              NSExtensionActivationSupportsMovieWithMaxCount: 1

  DryadsAiWatchApp:
    type: application.watchapp2
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchApp
    dependencies:
      - target: DryadsAiWatchExtension
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(DRYADS_AI_WATCH_APP_BUNDLE_ID)"
    info:
      path: WatchApp/Info.plist
      properties:
        CFBundleDisplayName: Dryads AI
        CFBundleShortVersionString: "2026.2.18"
        CFBundleVersion: "20260218"
        WKCompanionAppBundleIdentifier: "$(DRYADS_AI_APP_BUNDLE_ID)"
        WKWatchKitApp: true

  DryadsAiWatchExtension:
    type: watchkit2-extension
    platform: watchOS
    deploymentTarget: "11.0"
    sources:
      - path: WatchExtension/Sources
    dependencies:
      - sdk: WatchConnectivity.framework
      - sdk: UserNotifications.framework
    configFiles:
      Debug: Config/Signing.xcconfig
      Release: Config/Signing.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: "$(DRYADS_AI_WATCH_EXTENSION_BUNDLE_ID)"
    info:
      path: WatchExtension/Info.plist
      properties:
        CFBundleDisplayName: Dryads AI
        CFBundleShortVersionString: "2026.2.18"
        CFBundleVersion: "20260218"
        NSExtension:
          NSExtensionAttributes:
            WKAppBundleIdentifier: "$(DRYADS_AI_WATCH_APP_BUNDLE_ID)"
          NSExtensionPointIdentifier: com.apple.watchkit

  DryadsAiTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Dryads AI
      - package: Swabble
        product: SwabbleKit
      - sdk: AppIntents.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.dryadsai.ios.tests
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/DryadsAi.app/Dryads AI"
        BUNDLE_LOADER: "$(TEST_HOST)"
    info:
      path: Tests/Info.plist
      properties:
        CFBundleDisplayName: DryadsAiTests
        CFBundleShortVersionString: "2026.2.18"
        CFBundleVersion: "20260218"
