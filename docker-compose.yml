services:
  dryads-ai-gateway:
    image: ${DRYADS_AI_IMAGE:-dryads-ai:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      DRYADS_AI_GATEWAY_TOKEN: ${DRYADS_AI_GATEWAY_TOKEN}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${DRYADS_AI_CONFIG_DIR}:/home/node/.dryads-ai
      - ${DRYADS_AI_WORKSPACE_DIR}:/home/node/.dryads-ai/workspace
    ports:
      - "${DRYADS_AI_GATEWAY_PORT:-18789}:18789"
      - "${DRYADS_AI_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${DRYADS_AI_GATEWAY_BIND:-lan}",
        "--port",
        "18789",
      ]

  dryads-ai-cli:
    image: ${DRYADS_AI_IMAGE:-dryads-ai:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      DRYADS_AI_GATEWAY_TOKEN: ${DRYADS_AI_GATEWAY_TOKEN}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE}
    volumes:
      - ${DRYADS_AI_CONFIG_DIR}:/home/node/.dryads-ai
      - ${DRYADS_AI_WORKSPACE_DIR}:/home/node/.dryads-ai/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: ["node", "dist/index.js"]
